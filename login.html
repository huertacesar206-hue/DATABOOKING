<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inicio de Sesión - DataBooking</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="Estilos.css">
</head>
<body class="login-page">
    <div class="logo-text">Data Booking</div>

    <div class="login-card">
        <div class="login-title">Inicio de Sesión</div>

        <div id="error-msg" class="error-msg" style="display: none;"></div>

        <form id="form-login">
            <div class="input-group">
                <label for="usuario">Correo Electrónico</label>
                <input type="email" id="usuario" name="usuario" class="input-control" placeholder="ejemplo@gmail.com" required>
            </div>

            <div class="input-group">
                <label for="password">Contraseña</label>
                <div class="input-container">
                    <input type="password" id="password" name="password" class="input-control" placeholder="Contraseña" required>
                    <svg id="togglePassword" class="toggle-password" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="cursor: pointer;"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
                </div>
            </div>

            <button type="submit" class="btn-login">Iniciar Sesión</button>
        </form>
    </div>

    <script src="db.js"></script>
    <script>
        if (localStorage.getItem('usuario_id')) {
            window.location.href = 'index.html';
        }

        const pwd = document.querySelector('#password');
        const btn = document.querySelector('#togglePassword');
        btn.addEventListener('click', function () {
            const isPwd = pwd.type === 'password';
            pwd.type = isPwd ? 'text' : 'password';
            this.style.opacity = isPwd ? '0.5' : '1';
        });

        document.getElementById('form-login').addEventListener('submit', function(e) {
            e.preventDefault();
            const emailIngresado = document.getElementById('usuario').value.toLowerCase();
            const passwordIngresado = document.getElementById('password').value;
            const errorDiv = document.getElementById('error-msg');

            const usuariosRegistrados = JSON.parse(localStorage.getItem('usuarios')) || [];
            const usuarioEncontrado = usuariosRegistrados.find(u => u.username.toLowerCase() === emailIngresado && u.password === passwordIngresado);

            if (usuarioEncontrado) {
                localStorage.setItem('usuario_id', usuarioEncontrado.id.toString());
                localStorage.setItem('username', usuarioEncontrado.username);
                localStorage.setItem('nombre', usuarioEncontrado.nombre);
                localStorage.setItem('rol', usuarioEncontrado.rol);
                
                if (usuarioEncontrado.foto_perfil) {
                    localStorage.setItem('foto_perfil', usuarioEncontrado.foto_perfil);
                } else {
                    localStorage.removeItem('foto_perfil');
                }

                window.location.href = 'Index.html';
            } else {
                errorDiv.innerText = "Correo o contraseña incorrectos.";
                errorDiv.style.display = 'block';
            }
        });
    </script>
</body>
</html>
