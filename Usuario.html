<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Perfil - DataBooking</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="Estilos.css">
</head>
<body>
    <header class="digital-header d-flex justify-content-between align-items-center">
        <div class="tech-deco"></div>
        <div class="datetime-display">
            <div id="current-date" class="fs-6"></div>
            <div id="current-time" class="time-text">--:--</div>
        </div>
    </header>

    <nav class="navbar navbar-expand-lg custom-navbar px-4">
        <div class="container-fluid">
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon" style="filter: invert(1);"></span>
            </button>
            <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
                <ul class="navbar-nav gap-3">
                    <li class="nav-item"><a class="nav-link" href="Index.html">Inicio</a></li>
                    <li class="nav-item"><a class="nav-link" href="Categorias.html">Categorías</a></li>
                    <li class="nav-item"><a class="nav-link" href="Compras.html">Compras</a></li>
                    <li class="nav-item" id="nav-admin" style="display: none;"><a class="nav-link color-admin" href="admin.html">Administrador</a></li>
                    <li class="nav-item"><a class="nav-link text-white text-decoration-underline" href="Usuario.html">Mi Perfil</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="container-fluid usuario-container">
        <h2 class="titulo-usuario">Usuario</h2>

        <div class="perfil-wrapper">
            <img src="" alt="Foto de Perfil" class="foto-perfil" id="imagenPerfil">
            <div class="indicador-estado" id="botonEstado" title="Conectado"></div>
        </div>

        <div class="nombre-usuario" id="display-nombre"></div>

        <button class="btn-perfil btn-administrar" data-bs-toggle="modal" data-bs-target="#modalAdministrar">Administrar Perfil</button>
        <button class="btn-perfil btn-cerrar" onclick="window.location.href='logout.html'">Cerrar Sesión</button>
    </main>

    <div class="modal fade" id="modalAdministrar" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header border-secondary">
                    <h5 class="modal-title">Editar Perfil</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <form id="form-perfil">
                    <div class="modal-body">
                        <div class="mb-3">
                            <label class="form-label">Nombre a mostrar</label>
                            <input type="text" class="form-control" id="nuevo_nombre" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Foto de Perfil</label>
                            <input type="file" class="form-control" id="nueva_foto" accept="image/*">
                        </div>
                    </div>
                    <div class="modal-footer border-secondary">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                        <button type="submit" class="btn btn-primary" style="background-color: #0b3b5b; border: none;">Guardar Cambios</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <footer class="simple-footer">
        <div class="container">
            <strong style="color: white;">Data<span class="color-acento">Booking</span></strong>
            <p class="mb-0">© 2026 Tu biblioteca digital para programadores.</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="db.js"></script>
    <script>
        if (!localStorage.getItem('usuario_id')) window.location.href = 'login.html';

        const updateTime = () => { const now = new Date(); document.getElementById('current-date').innerText = now.toLocaleDateString('es-ES', { day: '2-digit', month: 'long', year: 'numeric' }).replace(/ de /g, ' del '); let h = now.getHours(), m = now.getMinutes(); document.getElementById('current-time').innerText = (h % 12 || 12) + ':' + m.toString().padStart(2, '0') + (h >= 12 ? ' p.m' : ' a.m'); };
        updateTime(); setInterval(updateTime, 1000);
        if (localStorage.getItem('rol') === 'admin') document.getElementById('nav-admin').style.display = 'block';

        const cargarPerfil = () => {
            const nombre = localStorage.getItem('nombre') || localStorage.getItem('username') || 'Usuario';
            const foto = localStorage.getItem('foto_perfil');
            
            document.getElementById('display-nombre').innerText = nombre;
            document.getElementById('nuevo_nombre').value = nombre;

            const imagenEl = document.getElementById('imagenPerfil');
            if (foto) {
                imagenEl.src = foto;
            } else {
                imagenEl.src = "https://ui-avatars.com/api/?name=" + encodeURIComponent(nombre) + "&background=0b101e&color=fff&size=200";
            }
        };

        cargarPerfil();

        document.getElementById('form-perfil').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const nuevoNombre = document.getElementById('nuevo_nombre').value;
            const nuevaFoto = document.getElementById('nueva_foto').files[0];

            localStorage.setItem('nombre', nuevoNombre);

            if (nuevaFoto) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    localStorage.setItem('foto_perfil', event.target.result);
                    alert('¡Perfil actualizado con éxito!');
                    window.location.reload();
                };
                reader.readAsDataURL(nuevaFoto);
            } else {
                alert('¡Perfil actualizado con éxito!');
                window.location.reload();
            }
        });
    </script>
</body>
</html>
