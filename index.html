<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inicio - DataBooking</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="Estilos.css">
</head>
<body>

    <header class="digital-header d-flex justify-content-between align-items-center">
        <div class="tech-deco"></div>
        <div class="datetime-display">
            <div id="current-date" class="fs-6">Cargando fecha...</div>
            <div id="current-time" class="time-text">--:--</div>
        </div>
    </header>

    <nav class="navbar navbar-expand-lg custom-navbar px-4">
        <div class="container-fluid">
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon" style="filter: invert(1);"></span>
            </button>
            <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
                <ul class="navbar-nav gap-3">
                    <li class="nav-item"><a class="nav-link text-white text-decoration-underline" href="index.html">Inicio</a></li>
                    <li class="nav-item"><a class="nav-link" href="Categorias.html">Categorías</a></li>
                    <li class="nav-item"><a class="nav-link" href="Compras.html">Compras</a></li>
                    <li class="nav-item" id="nav-admin" style="display: none;"><a class="nav-link color-admin" href="admin.html">Administrador</a></li>
                    <li class="nav-item"><a class="nav-link" href="Usuario.html">Mi Perfil</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="container-fluid books-container mb-5">
        <section class="hero-section text-center">
            <h1 class="mb-3">¡Bienvenido Programador!</h1>
            <p class="fs-5">Si el código funciona, <span class="consejo-rojo">¡no le muevas!</span></p>
        </section>

        <section class="mb-5">
            <h4 class="seccion-titulo" id="titulo-catalogo">Cargando libros desde la nube...</h4>
            
            <div class="row row-cols-2 row-cols-md-4 row-cols-lg-6 g-4" id="contenedor-libros">
            </div>
        </section>

        <section class="seccion-favoritos" id="seccion-favoritos" style="display: none;">
            <h4><i class="bi bi-heart-fill text-danger"></i> Mis Libros Guardados</h4>
            <div class="row row-cols-2 row-cols-md-4 row-cols-lg-6 g-4" id="contenedor-favoritos">
            </div>
        </section>
    </main>

    <footer class="simple-footer">
        <div class="container">
            <strong style="color: white;">Data<span class="color-acento">Booking</span></strong>
            <p class="mb-0">© 2026 Tu biblioteca digital para programadores.</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    
    <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-firestore-compat.js"></script>
    <script src="db.js"></script>
    
    <script>
        const updateTime = () => {
            const now = new Date();
            document.getElementById('current-date').innerText = now.toLocaleDateString('es-ES', { day: '2-digit', month: 'long', year: 'numeric' }).replace(/ de /g, ' del '); 
            let h = now.getHours(), m = now.getMinutes();
            document.getElementById('current-time').innerText = (h % 12 || 12) + ':' + m.toString().padStart(2, '0') + (h >= 12 ? ' p.m' : ' a.m');
        };
        updateTime(); setInterval(updateTime, 1000);

        if (localStorage.getItem('rol') === 'admin') {
            document.getElementById('nav-admin').style.display = 'block';
        }

        const urlParams = new URLSearchParams(window.location.search);
        const categoriaSeleccionada = urlParams.get('cat');

        const cargarPantalla = async () => {
            if (categoriaSeleccionada) {
                document.getElementById('titulo-catalogo').innerText = `Resultados para '${categoriaSeleccionada}'`;
            } else {
                document.getElementById('titulo-catalogo').innerText = "Libros que te pueden interesar...";
            }

            const libros = await obtenerLibros(categoriaSeleccionada);
            const contenedorLibros = document.getElementById('contenedor-libros');

            if (libros.length > 0) {
                contenedorLibros.innerHTML = '';
                libros.forEach(libro => {
                    const precioFormat = libro.precio > 0 ? `$${libro.precio.toFixed(2)}` : "¡Gratis!";
                    const tituloCortoPlaceholder = libro.titulo.length > 15 ? libro.titulo.substring(0, 15) + '...' : libro.titulo.toUpperCase();
                    const tituloCortoBarra = libro.titulo.length > 20 ? libro.titulo.substring(0, 20) + '...' : libro.titulo;
                    const pdfData = libro.archivo_pdf ? `libros_pdf/${libro.archivo_pdf}` : '';

                    contenedorLibros.innerHTML += `
                        <div class="col">
                            <a href="Libro.html?id=${libro.id}" class="book-link">
                                <div class="book-card">
                                    <div class="book-image-placeholder" data-pdf="${pdfData}">
                                        <canvas class="pdf-canvas"></canvas>
                                        <div class="placeholder-text">
                                            <small class="d-block text-info" style="font-size: 0.6rem;">DATABOOKING</small>
                                            ${tituloCortoPlaceholder}
                                        </div>
                                    </div>
                                    <div class="book-title-bar">
                                        ${tituloCortoBarra}<br>
                                        <span class="color-acento">${precioFormat}</span>
                                    </div>
                                </div>
                            </a>
                        </div>
                    `;
                });
            } else {
                contenedorLibros.innerHTML = `<div class="col-12 text-center py-5"><p class="text-secondary fs-5">Aún no hay libros disponibles en esta categoría.</p></div>`;
            }

            const favoritos = obtenerFavoritos();
            if (favoritos.length > 0) {
                document.getElementById('seccion-favoritos').style.display = 'block';
                const contenedorFavs = document.getElementById('contenedor-favoritos');
                
                favoritos.forEach(libro => {
                    const tituloCortoPlaceholder = libro.titulo.length > 12 ? libro.titulo.substring(0, 12) + '..' : libro.titulo.toUpperCase();
                    const tituloCortoBarra = libro.titulo.length > 20 ? libro.titulo.substring(0, 20) + '...' : libro.titulo;
                    const pdfData = libro.archivo_pdf ? `libros_pdf/${libro.archivo_pdf}` : '';

                    contenedorFavs.innerHTML += `
                        <div class="col">
                            <a href="Libro.html?id=${libro.id}" class="book-link">
                                <div class="book-card" style="border: 1px solid #00f2ff;">
                                    <div class="book-image-placeholder" data-pdf="${pdfData}">
                                        <canvas class="pdf-canvas"></canvas>
                                        <div class="placeholder-text">
                                            <small class="d-block text-info">FAVORITO</small>
                                            ${tituloCortoPlaceholder}
                                        </div>
                                    </div>
                                    <div class="book-title-bar">
                                        ${tituloCortoBarra}
                                    </div>
                                </div>
                            </a>
                        </div>
                    `;
                });
            }

            pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';
            document.querySelectorAll('.book-image-placeholder').forEach(c => {
                const url = c.dataset.pdf, canvas = c.querySelector('.pdf-canvas'), txt = c.querySelector('.placeholder-text');
                if (url && url.trim() !== 'libros_pdf/') {
                    pdfjsLib.getDocument(url).promise.then(pdf => pdf.getPage(1)).then(page => {
                        const vp = page.getViewport({scale: 0.5}), ctx = canvas.getContext('2d');
                        canvas.height = vp.height; canvas.width = vp.width;
                        page.render({ canvasContext: ctx, viewport: vp }).promise.then(() => {
                            canvas.style.display = 'block'; txt.style.display = 'none';
                        });
                    }).catch(e => console.log('Error cargando PDF:', e));
                }
            });
        };

        cargarPantalla();
    </script>
</body>
</html>
