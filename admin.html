<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Panel Administrador - DataBooking</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="Estilos.css">
</head>
<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-8 admin-card shadow">
                <h2 class="text-center mb-4 text-warning" id="form-titulo">Añadir Nuevo Libro</h2>
                
                <form id="form-admin">
                    <input type="hidden" id="id_libro_oculto" value="">

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">ID Único</label>
                            <input type="number" id="identificador" class="form-control" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Categoría / Lenguaje</label>
                            <select id="categoria" class="form-select" required>
                                <option value="" disabled selected>Selecciona lenguaje...</option>
                                <option value="python">Python</option>
                                <option value="c">C</option>
                                <option value="cplusplus">C++</option>
                                <option value="javascript">JavaScript</option>
                                <option value="java">Java</option>
                                <option value="html">HTML5</option>
                                <option value="ruby">Ruby</option>
                                <option value="sql">SQL Server</option>
                            </select>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Título del Libro</label>
                        <input type="text" id="titulo" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Autor</label>
                        <input type="text" id="autor" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Descripción</label>
                        <textarea id="descripcion" class="form-control" rows="3" required></textarea>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Precio ($)</label>
                        <input type="number" step="0.01" id="precio" class="form-control" value="0">
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label text-info">Archivo PDF</label>
                        <input type="file" id="archivo_pdf" class="form-control" accept="application/pdf" required>
                        <small class="text-secondary">Nota para GitHub: Asegúrate de subir manualmente el archivo PDF real a la carpeta 'libros_pdf'.</small>
                    </div>

                    <button type="submit" id="btn-submit-form" class="btn btn-primary btn-add">Subir a la Nube (Firebase)</button>
                    <a href="admin.html" id="link-cancelar" class="btn btn-secondary w-100 mt-2" style="display: none;">Cancelar Edición</a>
                </form>
                
                <div class="text-center mt-4">
                    <a href="index.html" class="text-info text-decoration-underline">Volver al Inicio</a>
                </div>
            </div>
        </div>

        <div class="row mb-5">
            <div class="col-12 tabla-contenedor shadow">
                <h3 class="mb-4 text-center" id="titulo-tabla"> ======== Cargando desde Firebase... ======== </h3>
                <div class="table-responsive">
                    <table class="table table-dark table-hover">
                        <thead>
                            <tr>
                                <th>ID</th><th>Categoría</th><th>Título</th><th>Autor</th><th>Precio</th><th>PDF</th><th class="text-center">Acciones</th>
                            </tr>
                        </thead>
                        <tbody id="tabla-libros-body">
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

<script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-firestore-compat.js"></script>
<script src="db.js"></script>
    <script>
        if (localStorage.getItem('rol') !== 'admin') {
            window.location.href = 'Index.html';
        }

        const form = document.getElementById('form-admin');
        const tableBody = document.getElementById('tabla-libros-body');
        const btnSubmit = document.getElementById('btn-submit-form');
        const formTitle = document.getElementById('form-titulo');
        const linkCancelar = document.getElementById('link-cancelar');

        let compras = JSON.parse(localStorage.getItem('compras')) || [];
        let favoritos = JSON.parse(localStorage.getItem('favoritos')) || [];
        let librosNube = [];

        const obtenerColorCategoria = (c) => {
            const cols = { 'python':'bg-warning text-dark', 'java':'bg-danger', 'javascript':'bg-info text-dark', 'sql':'bg-primary', 'html':'bg-secondary', 'ruby':'bg-danger' };
            return cols[c] || 'bg-dark border';
        };

        const renderTable = () => {
            tableBody.innerHTML = '';
            document.getElementById('titulo-tabla').innerText = "======== Libros en el Catálogo ========";
            if (librosNube.length === 0) {
                tableBody.innerHTML = "<tr><td colspan='7' class='text-center py-4'>No hay libros registrados.</td></tr>";
                return;
            }
            
            const librosOrdenados = [...librosNube].sort((a, b) => b.id - a.id);
            
            librosOrdenados.forEach(l => {
                const badgeColor = obtenerColorCategoria(l.categoria);
                const precioFormat = parseFloat(l.precio).toFixed(2);
                
                tableBody.innerHTML += `
                    <tr>
                        <td>${l.id}</td>
                        <td><span class="badge ${badgeColor}">${l.categoria.toUpperCase()}</span></td>
                        <td>${l.titulo}</td>
                        <td>${l.autor}</td>
                        <td>$${precioFormat}</td>
                        <td>${l.archivo_pdf ? 'Listo!' : 'No Existe'}</td>
                        <td class="text-center">
                            <a href="admin.html?editar=${l.id}" class="btn btn-warning btn-sm me-2">Editar</a>
                            <button class="btn btn-danger btn-sm" onclick="eliminarLibro(${l.id})">Eliminar</button>
                        </td>
                    </tr>
                `;
            });
        };

        const cargarAdmin = async () => {
            const snapshot = await db.collection("libros").get();
            librosNube = [];
            snapshot.forEach(doc => librosNube.push(doc.data()));
            localStorage.setItem('libros', JSON.stringify(librosNube)); 
            
            const urlParams = new URLSearchParams(window.location.search);
            const idEditar = parseInt(urlParams.get('editar'));
            if (idEditar) {
                const libroAEditar = librosNube.find(l => l.id === idEditar);
                if (libroAEditar) {
                    formTitle.innerText = "Editando Libro";
                    document.getElementById('id_libro_oculto').value = libroAEditar.id;
                    document.getElementById('identificador').value = libroAEditar.identificador;
                    document.getElementById('categoria').value = libroAEditar.categoria;
                    document.getElementById('titulo').value = libroAEditar.titulo;
                    document.getElementById('autor').value = libroAEditar.autor;
                    document.getElementById('descripcion').value = libroAEditar.descripcion;
                    document.getElementById('precio').value = libroAEditar.precio;
                    
                    btnSubmit.innerText = "Guardar Cambios en la Nube";
                    btnSubmit.classList.replace('btn-primary', 'btn-warning');
                    btnSubmit.classList.add('text-dark');
                    linkCancelar.style.display = 'block';
                    document.getElementById('archivo_pdf').required = false;
                }
            }
            renderTable();
        };

        window.eliminarLibro = async (id) => {
            if (confirm('¿Estás seguro de borrar este libro GLOBALMENTE de la nube?')) {
                await db.collection("libros").doc(id.toString()).delete();
                
                compras = compras.filter(c => parseInt(c.id_libro) !== id);
                favoritos = favoritos.filter(f => parseInt(f.id_libro) !== id);
                localStorage.setItem('compras', JSON.stringify(compras));
                localStorage.setItem('favoritos', JSON.stringify(favoritos));
                
                alert('Libro eliminado de la nube correctamente.');
                window.location.href = 'admin.html';
            }
        };

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            btnSubmit.innerText = "Guardando...";
            btnSubmit.disabled = true;

            const id_oculto = document.getElementById('id_libro_oculto').value;
            const fileInput = document.getElementById('archivo_pdf');
            
            let nombreArchivo = '';
            if (fileInput.files.length > 0) {
                nombreArchivo = fileInput.files[0].name;
            } else if (id_oculto) {
                const viejoLibro = librosNube.find(l => l.id === parseInt(id_oculto));
                nombreArchivo = viejoLibro ? viejoLibro.archivo_pdf : '';
            }

            const nuevoLibro = {
                id: id_oculto ? parseInt(id_oculto) : (librosNube.length > 0 ? Math.max(...librosNube.map(l => l.id)) + 1 : 1),
                identificador: document.getElementById('identificador').value,
                categoria: document.getElementById('categoria').value,
                titulo: document.getElementById('titulo').value,
                autor: document.getElementById('autor').value,
                descripcion: document.getElementById('descripcion').value,
                precio: parseFloat(document.getElementById('precio').value || 0),
                archivo_pdf: nombreArchivo
            };

            await db.collection("libros").doc(nuevoLibro.id.toString()).set(nuevoLibro);
            
            alert('¡Libro guardado en la nube con éxito!');
            window.location.href = 'admin.html';
        });

        cargarAdmin();
    </script>
</body>
</html>
