<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Libro - DataBooking</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="Estilos.css">
</head>
<body>
    <header class="digital-header d-flex justify-content-between align-items-center">
        <div class="tech-deco"></div>
        <div class="datetime-display">
            <div id="current-date" class="fs-6"></div>
            <div id="current-time" class="time-text">--:--</div>
        </div>
    </header>

    <nav class="navbar navbar-expand-lg custom-navbar px-4">
        <div class="container-fluid">
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon" style="filter: invert(1);"></span>
            </button>
            <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
                <ul class="navbar-nav gap-3">
                    <li class="nav-item"><a class="nav-link" href="index.html">Inicio</a></li>
                    <li class="nav-item"><a class="nav-link" href="Categorias.html">Categorías</a></li>
                    <li class="nav-item"><a class="nav-link" href="Compras.html">Compras</a></li>
                    <li class="nav-item" id="nav-admin" style="display: none;"><a class="nav-link color-admin" href="admin.html">Administrador</a></li>
                    <li class="nav-item"><a class="nav-link" href="Usuario.html">Mi Perfil</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="container libro-container" id="contenido-libro" style="display: none;"></main>

    <footer class="simple-footer">
        <div class="container">
            <strong style="color: white;">Data<span class="color-acento">Booking</span></strong>
            <p class="mb-0">© 2026 Tu biblioteca digital para programadores.</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <script src="db.js"></script>
    <script>
        const updateTime = () => {
            const now = new Date();
            document.getElementById('current-date').innerText = now.toLocaleDateString('es-ES', { day: '2-digit', month: 'long', year: 'numeric' }).replace(/ de /g, ' del '); 
            let h = now.getHours(), m = now.getMinutes();
            document.getElementById('current-time').innerText = (h % 12 || 12) + ':' + m.toString().padStart(2, '0') + (h >= 12 ? ' p.m' : ' a.m');
        };
        updateTime(); setInterval(updateTime, 1000);
        if (localStorage.getItem('rol') === 'admin') document.getElementById('nav-admin').style.display = 'block';

        const urlParams = new URLSearchParams(window.location.search);
        const idLibro = parseInt(urlParams.get('id'));
        const libros = JSON.parse(localStorage.getItem('libros')) || [];
        const libro = libros.find(l => l.id === idLibro);

        if (!libro) {
            alert('El libro no existe.');
            window.location.href = 'Index.html';
        } else {
            document.title = `${libro.titulo} - DataBooking`;
            const idUsuario = localStorage.getItem('usuario_id');
            const compras = JSON.parse(localStorage.getItem('compras')) || [];
            const favoritos = JSON.parse(localStorage.getItem('favoritos')) || [];

            const yaComprado = compras.some(c => c.id_usuario === idUsuario && parseInt(c.id_libro) === libro.id);
            const esFavorito = favoritos.some(f => f.id_usuario === idUsuario && parseInt(f.id_libro) === libro.id);
            const tieneAcceso = (libro.precio <= 0 || yaComprado);
            
            const precioFormat = libro.precio > 0 ? `$${libro.precio.toFixed(2)}` : "¡GRATIS!";
            const pdfData = libro.archivo_pdf ? `libros_pdf/${libro.archivo_pdf}` : '';

            let botonesHTML = '';
            if (libro.precio > 0 && !yaComprado) {
                botonesHTML += `<a href="Formulario.html?id=${libro.id}" class="btn-comprar shadow text-decoration-none">Comprar ahora</a>`;
            }
            if (libro.archivo_pdf) {
                if (tieneAcceso) {
                    botonesHTML += `
                        <a href="${pdfData}" target="_blank" class="btn-leer shadow">Leer</a>
                        <a href="${pdfData}" download class="btn-descargar shadow">Descargar</a>`;
                } else {
                    botonesHTML += `<button class="btn-bloqueado shadow" onclick="alert('Debes comprar este libro para acceder al PDF.');"><i class="bi bi-lock-fill"></i> Bloqueado</button>`;
                }
            }

            document.getElementById('contenido-libro').innerHTML = `
                <div class="row">
                    <div class="col-md-5 d-flex justify-content-center mb-5 mb-md-0">
                        <div class="portada-grande" id="portada-container" data-pdf="${pdfData}">
                            <canvas id="canvas-portada-grande" class="pdf-canvas-grande"></canvas>
                            <div class="placeholder-text-grande" id="texto-portada-grande">
                                <small class="d-block text-info" style="font-size: 0.8rem;">DATABOOKING</small>
                                ${libro.titulo.toUpperCase()}
                            </div>
                        </div>
                    </div>
                    <div class="col-md-7 info-libro">
                        <div class="d-flex align-items-center mb-2">
                            <h1>${libro.titulo}</h1>
                            <i class="bi ${esFavorito ? 'bi-heart-fill' : 'bi-heart'} btn-fav ms-4" id="heart-fav" data-id="${libro.id}"></i>
                        </div>
                        <div class="autor-text">Por: ${libro.autor}</div>
                        <div class="badge-cat">Lenguaje: ${libro.categoria.toUpperCase()}</div>
                        <div class="descripcion-caja">
                            <h5 class="text-info mb-3">Descripción:</h5>
                            <p>${libro.descripcion}</p>
                        </div>
                        <div class="precio-text">${precioFormat}</div>
                        <div class="acciones d-flex gap-4">${botonesHTML}</div>
                    </div>
                </div>
            `;
            document.getElementById('contenido-libro').style.display = 'block';

            document.getElementById('heart-fav').addEventListener('click', function() {
                const icon = this;
                const favs = JSON.parse(localStorage.getItem('favoritos')) || [];
                const index = favs.findIndex(f => f.id_usuario === idUsuario && parseInt(f.id_libro) === libro.id);

                if (index > -1) {
                    favs.splice(index, 1);
                    icon.classList.remove('bi-heart-fill');
                    icon.classList.add('bi-heart');
                } else {
                    favs.push({ id_usuario: idUsuario, id_libro: libro.id });
                    icon.classList.remove('bi-heart');
                    icon.classList.add('bi-heart-fill');
                }
                localStorage.setItem('favoritos', JSON.stringify(favs));
            });

            pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';
            if (pdfData) {
                pdfjsLib.getDocument(pdfData).promise.then(pdf => pdf.getPage(1)).then(page => {
                    const canvas = document.getElementById('canvas-portada-grande'), vp = page.getViewport({scale: 1.5});
                    canvas.height = vp.height; canvas.width = vp.width;
                    page.render({canvasContext: canvas.getContext('2d'), viewport: vp}).promise.then(() => {
                        canvas.style.display = 'block'; document.getElementById('texto-portada-grande').style.display = 'none';
                    });
                }).catch(e => console.log('Sin PDF válido'));
            }
        }
    </script>
</body>
</html>
